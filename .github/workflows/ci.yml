name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: Build & lint (Swift)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Select latest Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Lint formatting
        run: swift format lint --recursive --strict --configuration .swift-format Sources Tests

      - name: Build (release)
        run: swift build -c release

      - name: Run tests
        run: swift test

  helper:
    name: Helper (Node)
    runs-on: macos-15
    defaults:
      run:
        working-directory: helpers
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check claude-usage.mjs
