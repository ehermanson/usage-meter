name: Release

# Cuts a signed, notarized, stapled release whenever a v* tag is pushed:
#   git tag v1.2.0 && git push origin v1.2.0
# Produces build/UsageMeter.dmg + .zip and attaches them to a GitHub Release.
#
# Required repo secrets (Settings → Secrets and variables → Actions), or set them
# with `gh secret set` — see the README "Automated releases" section:
#   MACOS_CERT_P12        base64 of the exported "Developer ID Application" .p12
#   MACOS_CERT_PASSWORD   the password you set when exporting that .p12
#   KEYCHAIN_PASSWORD     any random string (for the throwaway CI keychain)
#   CODESIGN_IDENTITY     e.g. "Developer ID Application: Eric Hermanson (2YN57RAL6Q)"
#   APPLE_ID              Apple ID email used for notarization
#   APPLE_TEAM_ID         10-char team id, e.g. 2YN57RAL6Q
#   APPLE_APP_PASSWORD    app-specific password from appleid.apple.com

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build a release for, e.g. v1.0.0"
        required: true

permissions:
  contents: write # create releases + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, notarize & publish
    runs-on: macos-15
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0 # tags needed for the version in build.sh

      - name: Select latest Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run tests
        run: swift test

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import Developer ID signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$MACOS_CERT_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Allow codesign to use the key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Put our keychain first in the search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed s/\"//g)
          rm -f "$CERT_PATH"
          echo "Imported identities:"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials usage-meter-notary \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Build, sign, notarize, staple
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          NOTARY_PROFILE: usage-meter-notary
        run: ./scripts/notarize.sh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" build/UsageMeter.dmg build/UsageMeter.zip --clobber
          else
            gh release create "$TAG" \
              build/UsageMeter.dmg build/UsageMeter.zip \
              --title "Usage Meter ${TAG#v}" \
              --generate-notes
          fi
